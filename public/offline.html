<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12072f" />
    <title>FI-YOU Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 20%, #3d1b86, #12072f 62%, #07031a);
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(84vw, 360px);
        padding: 28px;
        border: 1px solid rgba(185, 159, 255, 0.28);
        border-radius: 28px;
        background: rgba(22, 16, 64, 0.72);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #d8cef8;
        line-height: 1.65;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FI-YOU</h1>
      <p>지금은 네트워크 연결이 불안정해요. 연결이 돌아오면 이어서 나를 탐구할 수 있어요.</p>
    </main>
  </body>
</html>
